stages:
  - test
  - integration

variables:
  AUTO_DEVOPS_DISABLED: "true"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

# Unit Tests
unit_tests:
  stage: test
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y libgl1-mesa-glx libglib2.0-0
    - pip install --upgrade pip
    - pip install torch==2.2.2 torchvision==0.17.2 --index-url https://download.pytorch.org/whl/cpu
    - pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu
  script:
    - make test-unit
  artifacts:
    when: always
    reports:
      junit: tests/test-results.xml
    paths:
      - tests/test-results.xml
    expire_in: 1 week

# Fast Tests (no slow/gpu/data tests)
fast_tests:
  stage: test
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y libgl1-mesa-glx libglib2.0-0
    - pip install --upgrade pip
    - pip install torch==2.2.2 torchvision==0.17.2 --index-url https://download.pytorch.org/whl/cpu
    - pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu
  script:
    - make test-fast

# Smoke Test (Training Pipeline)
smoke_test:
  stage: integration
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y libgl1-mesa-glx libglib2.0-0
    - pip install --upgrade pip
    - pip install torch==2.2.2 torchvision==0.17.2 --index-url https://download.pytorch.org/whl/cpu
    - pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu
  script:
    - make smoke-test
  only:
    - main
    - sync-main

# Integration Tests (only on main branch)
integration_tests:
  stage: integration
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y libgl1-mesa-glx libglib2.0-0
    - pip install --upgrade pip
    - pip install torch==2.2.2 torchvision==0.17.2 --index-url https://download.pytorch.org/whl/cpu
    - pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu
  script:
    - make test-integration
  only:
    - main
    - sync-main
  allow_failure: true  # Allow to fail since they require more resources
